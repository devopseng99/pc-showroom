apiVersion: v1
kind: ServiceAccount
metadata:
  name: pc-showroom-sa
  namespace: pc-showroom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pc-showroom-crd-reader
rules:
  - apiGroups: ["paperclip.istayintek.com"]
    resources: ["paperclipbuilds"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pc-showroom-crd-reader
subjects:
  - kind: ServiceAccount
    name: pc-showroom-sa
    namespace: pc-showroom
roleRef:
  kind: ClusterRole
  name: pc-showroom-crd-reader
  apiGroup: rbac.authorization.k8s.io
