apiVersion: v1
kind: Service
metadata:
  name: showroom-pg
  namespace: pc-showroom
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: showroom-pg
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: showroom-pg
  namespace: pc-showroom
spec:
  serviceName: showroom-pg
  replicas: 1
  selector:
    matchLabels:
      app: showroom-pg
  template:
    metadata:
      labels:
        app: showroom-pg
    spec:
      nodeSelector:
        kubernetes.io/hostname: mgplcb05
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: showroom-pg-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: showroom-pg-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: showroom-pg-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "showroom"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "showroom"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: showroom-pg-claim
